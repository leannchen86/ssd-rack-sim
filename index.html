<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSD Rack Simulator</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-panel: #151b2b;
      --border: #1f2937;
      --text: #c8d0e0;
      --text-dim: #6b7894;
      --accent: #4fc3f7;
      --left-panel-width: 260px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    .font-mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }

    .app-grid {
      display: grid;
      grid-template-columns: var(--left-panel-width) minmax(0, 1fr) 360px;
      grid-template-rows: auto 1fr;
      position: relative;
      height: 100vh;
      gap: 0;
      transition: grid-template-columns 0.18s ease;
    }

    .app-grid.sidebar-collapsed {
      --left-panel-width: 0px;
    }

    .header {
      grid-column: 1 / -1;
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
    }

    .panel {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 10px;
      min-width: 0;
      transition: padding 0.18s ease, border-color 0.18s ease;
    }

    .app-grid.sidebar-collapsed .panel {
      border-right-color: transparent;
      border-right-width: 0;
      overflow: hidden;
      padding-left: 0;
      padding-right: 0;
    }

    .panel-inner {
      min-width: 240px;
    }

    .sidebar-tab {
      position: absolute;
      top: 76px;
      left: var(--left-panel-width);
      z-index: 130;
      width: 22px;
      height: 72px;
      display: grid;
      place-items: center;
      border: 1px solid #26314d;
      border-left-color: #1f2937;
      border-radius: 0 6px 6px 0;
      background: #111827;
      color: #8a96ad;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      cursor: pointer;
      box-shadow: 8px 12px 26px rgba(0, 0, 0, 0.28);
      transform: translateX(-1px);
      transition: left 0.18s ease, color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .app-grid.sidebar-collapsed .sidebar-tab {
      transform: translateX(0);
    }

    .sidebar-tab:hover,
    .sidebar-tab:focus-visible {
      color: #dbeafe;
      border-color: #3d4f79;
      background: #151d33;
      outline: none;
    }

    .panel-right {
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px;
    }

    .workspace {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--bg-primary);
    }

    .telemetry-bar {
      flex: 0 0 auto;
      border-bottom: 1px solid var(--border);
      background: #0c1220;
      padding: 8px 10px;
    }

    .telemetry-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .canvas-container {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    select {
      width: 100%;
      background: #1a2138;
      border: 1px solid #2e3a5c;
      color: var(--text);
      padding: 5px 7px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); }
    select option { background: #1a2138; }
    optgroup { color: var(--text-dim); font-style: normal; font-size: 10px; }

    .btn {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      border: 1px solid #2e3a5c;
      background: #1a2138;
      color: var(--text);
      transition: all 0.15s;
    }
    .btn:hover { background: #2a3456; border-color: #4a5a8c; }

    .drive-card { border: 1px solid transparent; }
    .drive-card:hover { border-color: #2e3a5c; }
    .drive-card.can-drag { cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; }
    .drive-card.can-drag:active { cursor: grabbing; }

    .stats-shell,
    .makeup-card {
      background: #111827;
      border: 1px solid #26314d;
      border-radius: 6px;
      padding: 8px;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .strip-card {
      position: relative;
      min-width: 0;
      min-height: 54px;
      border: 1px solid #2e3a5c;
      border-radius: 5px;
      background: #151d33;
      padding: 6px 8px;
    }

    .strip-card:hover,
    .strip-card:focus-within {
      z-index: 90;
    }

    .strip-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #e2e8f0;
    }

    .strip-value-sm {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #e2e8f0;
    }

    .strip-card .meter,
    .strip-card .split-bar {
      margin-top: 3px;
    }

    .stat-hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-bottom: 6px;
    }

    .stat-hero,
    .stat-mini {
      background: #1a2138;
      border-radius: 5px;
      padding: 7px 8px;
      border: 1px solid #2e3a5c;
      min-width: 0;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 50px 1fr auto;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      border-top: 1px solid #202a43;
      padding: 6px 0;
    }

    .stat-row-main {
      min-width: 0;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: #cbd5e1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stat-mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 6px;
    }

    .stat-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 1px;
    }

    .term-anchor {
      position: relative;
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      border-bottom: 1px dotted rgba(148, 163, 184, 0.55);
      color: inherit;
      cursor: help;
      outline: none;
    }

    .term-anchor:focus-visible {
      color: #e2e8f0;
      border-bottom-color: var(--accent);
    }

    .term-anchor.term-compact {
      border-bottom: 0;
    }

    .term-label-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .term-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 80;
      display: block;
      width: 240px;
      max-width: min(72vw, 260px);
      padding: 8px;
      border: 1px solid #3b4a74;
      border-radius: 5px;
      background: #0b1220;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(79, 195, 247, 0.08);
      color: #cbd5e1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.35;
      text-transform: none;
      white-space: normal;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-3px);
      transition: opacity 0.12s ease, transform 0.12s ease, visibility 0.12s ease;
    }

    .term-popover::before {
      content: '';
      position: absolute;
      top: -5px;
      left: 10px;
      width: 8px;
      height: 8px;
      border-left: 1px solid #3b4a74;
      border-top: 1px solid #3b4a74;
      background: #0b1220;
      transform: rotate(45deg);
    }

    .term-anchor:hover .term-popover,
    .term-anchor:focus-visible .term-popover {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .term-popover-title {
      display: block;
      margin-bottom: 4px;
      color: #f8fafc;
      font-size: 10px;
      font-weight: 700;
    }

    .term-popover-body {
      display: block;
      color: #94a3b8;
    }

    .term-popover-rows {
      display: grid;
      gap: 3px;
      margin-top: 7px;
      padding-top: 6px;
      border-top: 1px solid #1f2a44;
    }

    .term-popover-row {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 7px;
      min-width: 0;
    }

    .term-popover-row span:first-child {
      color: #64748b;
    }

    .term-popover-row span:last-child {
      min-width: 0;
      color: #dbeafe;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #e2e8f0;
      line-height: 1.2;
    }

    .stat-sub {
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 1px;
    }

    .stat-value-sm {
      font-size: 12px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #e2e8f0;
      line-height: 1.25;
    }

    .meter {
      height: 5px;
      width: 100%;
      overflow: hidden;
      border-radius: 999px;
      background: #0d1322;
      border: 1px solid #26314d;
    }

    .meter-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 0.2s ease;
    }

    .split-bar {
      display: flex;
      width: 100%;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #0d1322;
      border: 1px solid #26314d;
    }

    .split-segment {
      min-width: 2px;
      height: 100%;
    }

    .metric-pair {
      display: grid;
      grid-template-columns: 18px 1fr 36px;
      align-items: center;
      gap: 5px;
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
    }

    .bottleneck-row {
      grid-template-columns: 24px 1fr 42px;
    }

    .status-pill {
      border-radius: 999px;
      padding: 1px 6px;
      border: 1px solid #2e3a5c;
      background: #0d1322;
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .fitness-card {
      background: #111827;
      border: 1px solid #26314d;
      border-radius: 5px;
      padding: 7px 8px;
    }

    .fitness-row {
      display: grid;
      grid-template-columns: 32px 1fr 58px;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
    }

    .fitness-compact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 7px;
    }

    .fit-tile {
      position: relative;
      min-width: 0;
      border: 1px solid #26314d;
      border-radius: 5px;
      background: #0d1322;
      padding: 5px;
    }

    .fit-tile:hover,
    .fit-tile:focus-within {
      z-index: 90;
    }

    .fit-tile-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 5px;
      font-size: 8px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .fit-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 9px;
      color: #cbd5e1;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .context-stack {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    #fitness-panel:empty {
      display: none;
    }

    .selected-drive-card {
      padding: 8px;
    }

    .drive-hover-card {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 120;
      width: min(340px, calc(100vw - 24px));
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transform: translateY(4px);
      transition: opacity 0.12s ease, transform 0.12s ease, visibility 0.12s ease;
    }

    .drive-hover-card.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .drive-hover-card .makeup-card {
      background: rgba(17, 24, 39, 0.97);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(79, 195, 247, 0.08);
    }

    .drive-detail-head {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
    }

    .drive-swatch {
      width: 20px;
      height: 34px;
      border-radius: 3px;
      border: 1px solid #33405f;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      position: relative;
      overflow: hidden;
    }

    .drive-swatch::before {
      content: '';
      position: absolute;
      left: 5px;
      right: 5px;
      top: 6px;
      height: 4px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.16);
    }

    .drive-swatch::after {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      left: 5px;
      bottom: 5px;
      border-radius: 99px;
      background: #4fc3f7;
      box-shadow: 0 0 8px rgba(79, 195, 247, 0.85);
    }

    .drive-fact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
      margin-top: 6px;
    }

    .drive-fact {
      min-width: 0;
      border: 1px solid #26314d;
      border-radius: 5px;
      background: #0d1322;
      padding: 4px 6px;
    }

    .drive-fact-label {
      font-size: 8px;
      font-weight: 600;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
    }

    .drive-fact-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 10px;
      color: #cbd5e1;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 1px;
    }

    .drive-note {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .drive-token-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .drive-token-strip .info-chip {
      min-height: 19px;
      padding: 2px 6px;
      font-size: 9px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .info-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      min-height: 20px;
      border: 1px solid #2e3a5c;
      background: #0d1322;
      color: #9aa6bd;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .category-chip {
      border: 1px solid #26314d;
      background: #101827;
      color: #8a96ad;
      border-radius: 999px;
      padding: 2px 6px;
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .insight-dashboard {
      border: 1px solid #26314d;
      border-radius: 6px;
      background: #101827;
      padding: 8px;
      margin-bottom: 8px;
    }

    .severity-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
      margin-top: 6px;
    }

    .severity-tally {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #26314d;
      border-radius: 999px;
      background: #0d1322;
      padding: 3px 5px;
    }

    .severity-count {
      font-size: 11px;
      line-height: 1.1;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .severity-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 8px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .issue-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 6px;
    }

    .issue-cluster {
      min-width: 0;
      min-height: 72px;
      border: 1px solid #26314d;
      border-left-width: 3px;
      border-left-color: var(--issue-color);
      border-radius: 5px;
      background: #0f1726;
      padding: 7px;
      font-family: 'JetBrains Mono', monospace;
    }

    .issue-cluster-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      color: #8a96ad;
      font-size: 9px;
      margin-bottom: 5px;
    }

    .issue-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .issue-count {
      color: #e2e8f0;
      font-weight: 700;
    }

    .issue-primary {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #e2e8f0;
      font-size: 10px;
      font-weight: 700;
    }

    .issue-secondary {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #7b859b;
      font-size: 9px;
      margin-top: 4px;
    }

    .issue-markers {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 7px;
    }

    .issue-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--dot-color);
      box-shadow: 0 0 8px color-mix(in srgb, var(--dot-color) 45%, transparent);
    }

    .issue-more {
      min-width: 18px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid #26314d;
      color: #7b859b;
      font-size: 8px;
      line-height: 12px;
      text-align: center;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hint {
      font-size: 9px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      padding: 6px;
      border: 1px dashed #2e3a5c;
      border-radius: 4px;
      text-align: center;
      line-height: 1.4;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    .toggle-label input[type="checkbox"] {
      appearance: none;
      width: 32px;
      height: 18px;
      background: #2e3a5c;
      border-radius: 9px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .toggle-label input[type="checkbox"]::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #6b7894;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .toggle-label input[type="checkbox"]:checked {
      background: #7c3aed;
    }

    .toggle-label input[type="checkbox"]:checked::after {
      left: 16px;
      background: #e2e8f0;
    }

    .toggle-label input[type="checkbox"]:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .insight-card {
      transition: border-color 0.2s;
    }
    .insight-card:hover {
      border-color: #4a5a8c;
    }

    .panel-right #stats-panel .stats-strip {
      grid-template-columns: 1fr;
    }

    .panel-right #stats-panel .strip-card {
      min-height: 66px;
    }

    @media (max-width: 1100px) {
      .app-grid {
        --left-panel-width: 250px;
        grid-template-columns: var(--left-panel-width) minmax(0, 1fr);
      }

      .panel {
        padding: 9px;
      }

      .panel-inner {
        min-width: 232px;
      }

      .panel-right {
        display: none;
      }

      .stats-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2e3a5c; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a5a8c; }
  </style>
</head>
<body>
  <div class="app-grid">
    <!-- Header -->
    <header class="header">
      <div class="flex items-center gap-3">
        <div class="text-sm font-bold font-mono tracking-tight" style="color: var(--accent);">SSD RACK SIM</div>
        <div class="text-xs text-gray-500 font-mono">Data Center Drive Configurator</div>
      </div>
      <div class="text-xs text-gray-600 font-mono">May 2026 retail pricing · consumer SSDs</div>
    </header>

    <!-- Left Panel: Server + Controls + Drives -->
    <div id="left-panel" class="panel">
      <div class="panel-inner">
        <div class="mb-3">
          <div class="section-title">Server</div>
          <select id="server-select"></select>
        </div>

        <div id="bay-config-group" class="mb-3" style="display: none;">
          <div class="section-title">Bay Configuration</div>
          <select id="bay-config-select"></select>
        </div>

        <div class="mb-3">
          <div class="section-title">Use Case</div>
          <select id="workload-select"></select>
        </div>

        <div class="mb-3">
          <div class="section-title">Network Path</div>
          <select id="network-select"></select>
          <div id="network-info" class="hint mt-1"></div>
        </div>

        <div class="mb-3">
          <div class="section-title">M.2 Expansion</div>
          <select id="expansion-select"></select>
          <div id="module-info" class="hint mt-1"></div>
        </div>

        <div class="mb-2">
          <div class="section-title">Fill Bays</div>
          <select id="fill-strategy-select"></select>
          <select id="fill-drive-select" class="mt-1" style="display: none;"></select>
        </div>

        <div class="mb-2 flex gap-2">
          <button id="fill-all-btn" class="btn flex-1">Fill Empty</button>
          <button id="clear-all-btn" class="btn flex-1">Clear All</button>
        </div>

        <div class="mb-2">
          <div class="section-title">Drive Catalog</div>
        </div>
        <div id="drive-palette" class="space-y-1"></div>
      </div>
    </div>
    <button id="sidebar-toggle" class="sidebar-tab" type="button" aria-controls="left-panel" aria-expanded="true">Menu</button>

    <!-- Center Workspace: Rack View -->
    <div class="workspace">
      <div class="canvas-container">
        <canvas id="rack-canvas"></canvas>
      </div>
    </div>

    <!-- Right: Live Stats -->
    <div class="panel-right" style="border-left: 1px solid #1a2040;">
      <div class="mb-2">
        <div class="section-title flex items-center gap-2">
          <span>Live Stats</span>
        </div>
        <div class="text-xs text-gray-600 font-mono">updates as drives change</div>
      </div>
      <div id="stats-panel">
        <div class="text-gray-600 text-xs font-mono p-2">Select a server to begin</div>
      </div>
    </div>
    <div id="drive-hover-card" class="drive-hover-card" aria-hidden="true"></div>
  </div>

  <script type="module" src="./js/app.js?v=41"></script>
</body>
</html>
